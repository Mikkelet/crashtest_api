services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: api_proxy
      POSTGRES_PASSWORD: api_proxy
      POSTGRES_DB: api_proxy
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_proxy -d api_proxy"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgres://api_proxy:api_proxy@db:5432/api_proxy?sslmode=disable
      LISTEN_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
